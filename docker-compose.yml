version: '3.9'

services:
  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    command: sh -c "apk add --no-cache chromium && npm install && npx prisma db push && npm run dev"
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost:5173
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    env_file:
      - ./frontend/.env
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - '5173:5173'
    environment:
      VITE_WS_URL: ws://localhost:4000
      VITE_API_URL: http://localhost:4000
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '300'
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: docs
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
