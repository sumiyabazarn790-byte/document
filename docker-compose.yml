version: '3.9'

services:
  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - '4000:4000'
    environment:
      PORT: 4000

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - '5173:5173'
    environment:
      VITE_WS_URL: ws://localhost:4000
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: docs
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
